# Server-level configuration for `dashboard serve --config` (mounted into the
# api container at /etc/dashboard/config.yaml by the example compose).
#
# Repositories and review rules are per-user now: each signed-in user picks the
# repos they observe and tunes their own review policy from the in-app Settings
# screens, and those live in the database. This file only carries server-level
# operational settings.

poll:
  interval: 1m   # default cadence each observed repo is polled on (its own ticker)
